"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username \
$hostname \
$directory\
$git_branch\
$git_status 
"""

[directory]
style = "blue"
truncation_length = 3

[git_branch]
format = "[$branch]($style)"
style = "bright-black"
symbol = ""
truncation_symbol = ""

[git_status]
format = "[[($conflicted$untracked$modified$staged$renamed$deleted)](218)($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = " c"
untracked = " u"
modified = " m"
staged = " s"
renamed = " r"
deleted = " d"
stashed = " S"
ahead = " a"
behind = " b"

[git_state]
format = '\([$state($progress_current/$progress_total)]($style)\) '
style = "bright-black"

[username]
show_always = true
format = '[$user]($style)'

[hostname]
format = "[$hostname]($style)"
disabled = false
ssh_only = false
