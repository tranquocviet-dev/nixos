theme = "noctalia"
[editor]
line-number = "relative"
auto-format = true
[editor.file-picker]
hidden = true
[editor.whitespace.render]
space = "all"
tab = "all"
newline = "none"
[keys.normal]
space.s = [":indent-style t", ":w"]
i = [":indent-style t", "collapse_selection", "insert_mode"]
a = [":indent-style t", "collapse_selection", "insert_mode"]
[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"
[editor.whitespace.characters]
tabpad ="·"
tab ="·"
